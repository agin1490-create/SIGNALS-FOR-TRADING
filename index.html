<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>SIGNUM | BTC/ETH Scalping Engine</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');
    
    :root {
      --bg: #050810;
      --card: #0a0f1c;
      --neon-green: #00ff88;
      --neon-red: #ff3366;
      --neon-orange: #ff9500;
      --neon-blue: #00d4ff;
      --neon-purple: #b829dd;
      --text: #e0e6ed;
      --muted: #6b7280;
      --border: #1e293b;
      --glow-green: 0 0 20px rgba(0, 255, 136, 0.5);
      --glow-red: 0 0 20px rgba(255, 51, 102, 0.5);
      --glow-orange: 0 0 20px rgba(255, 149, 0, 0.5);
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      font-family: 'Rajdhani', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body { 
      background: var(--bg); 
      color: var(--text); 
      min-height: 100vh; 
      padding: 1rem;
      background-image: 
        radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(184, 41, 221, 0.05) 0%, transparent 50%);
    }

    .header {
      text-align: center;
      margin-bottom: 1.5rem;
      padding: 1rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(10,15,28,0.8) 0%, rgba(5,8,16,0.9) 100%);
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
      animation: scan 3s linear infinite;
    }

    @keyframes scan {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    .logo {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.8rem, 6vw, 2.5rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--neon-green) 0%, var(--neon-blue) 50%, var(--neon-purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
      letter-spacing: 4px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 0.3rem;
      letter-spacing: 2px;
    }

    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.8rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .stat-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-value {
      font-family: 'Orbitron', monospace;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--neon-blue);
      margin-top: 0.2rem;
    }

    .grid { 
      display: grid; 
      gap: 1.2rem; 
      max-width: 900px; 
      margin: 0 auto;
    }

    .card { 
      background: var(--card); 
      border: 1px solid var(--border); 
      border-radius: 16px; 
      padding: 1.2rem;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card.active::before {
      opacity: 1;
    }

    .asset-header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 1rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .asset-name { 
      font-family: 'Orbitron', monospace;
      font-weight: 700; 
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .asset-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--neon-blue);
      box-shadow: 0 0 10px var(--neon-blue);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .price-group {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.2rem;
    }

    .price { 
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.2rem, 4vw, 1.5rem); 
      font-weight: 700;
      color: var(--neon-blue);
    }

    .price-inr {
      font-size: 0.85rem;
      color: var(--neon-orange);
      font-weight: 600;
    }

    .currency-toggle {
      display: flex;
      gap: 0.3rem;
      margin-top: 0.3rem;
    }

    .currency-btn {
      padding: 0.2rem 0.5rem;
      font-size: 0.7rem;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .currency-btn.active {
      background: var(--neon-blue);
      color: var(--bg);
      border-color: var(--neon-blue);
      font-weight: 700;
    }

    .metrics { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 0.6rem; 
      margin: 1rem 0;
    }

    .metric { 
      background: rgba(30, 41, 59, 0.5); 
      padding: 0.7rem; 
      border-radius: 10px;
      border: 1px solid rgba(30, 41, 59, 0.8);
      transition: all 0.3s;
    }

    .metric:hover {
      border-color: var(--neon-blue);
      transform: translateY(-2px);
    }

    .metric-label { 
      font-size: 0.7rem; 
      color: var(--muted); 
      text-transform: uppercase; 
      letter-spacing: 1px;
    }

    .metric-value { 
      font-family: 'Orbitron', monospace;
      font-size: 0.95rem; 
      margin-top: 0.2rem; 
      font-weight: 600;
    }

    .signal-box {
      text-align: center; 
      padding: 1rem; 
      border-radius: 12px; 
      margin-top: 1rem; 
      font-family: 'Orbitron', monospace;
      font-weight: 700; 
      font-size: 1.1rem; 
      letter-spacing: 2px;
      border: 2px solid;
      position: relative;
      overflow: hidden;
    }

    .signal-box.buy { 
      background: rgba(0, 255, 136, 0.1); 
      color: var(--neon-green); 
      border-color: var(--neon-green);
      box-shadow: var(--glow-green);
      animation: glow-green 2s ease-in-out infinite;
    }

    .signal-box.sell { 
      background: rgba(255, 51, 102, 0.1); 
      color: var(--neon-red); 
      border-color: var(--neon-red);
      box-shadow: var(--glow-red);
      animation: glow-red 2s ease-in-out infinite;
    }

    .signal-box.neutral { 
      background: rgba(255, 149, 0, 0.1); 
      color: var(--neon-orange); 
      border-color: var(--neon-orange);
      box-shadow: var(--glow-orange);
    }

    .signal-box.strong-buy {
      background: rgba(0, 255, 136, 0.2);
      color: var(--neon-green);
      border-color: var(--neon-green);
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.7);
      animation: none;
    }

    .signal-box.strong-sell {
      background: rgba(255, 51, 102, 0.2);
      color: var(--neon-red);
      border-color: var(--neon-red);
      box-shadow: 0 0 30px rgba(255, 51, 102, 0.7);
      animation: none;
    }

    @keyframes glow-green {
      0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 136, 0.3); }
      50% { box-shadow: 0 0 30px rgba(0, 255, 136, 0.6); }
    }

    @keyframes glow-red {
      0%, 100% { box-shadow: 0 0 20px rgba(255, 51, 102, 0.3); }
      50% { box-shadow: 0 0 30px rgba(255, 51, 102, 0.6); }
    }

    .indicators {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .indicator-tag {
      display: inline-block;
      padding: 0.3rem 0.6rem;
      margin: 0.2rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid var(--border);
    }

    .indicator-tag.bullish {
      color: var(--neon-green);
      border-color: var(--neon-green);
      background: rgba(0, 255, 136, 0.1);
    }

    .indicator-tag.bearish {
      color: var(--neon-red);
      border-color: var(--neon-red);
      background: rgba(255, 51, 102, 0.1);
    }

    .indicator-tag.neutral-tag {
      color: var(--neon-orange);
      border-color: var(--neon-orange);
      background: rgba(255, 149, 0, 0.1);
    }

    .analyze-btn {
      width: 100%;
      margin-top: 1rem;
      padding: 0.9rem;
      background: transparent;
      border: 2px solid var(--neon-green);
      color: var(--neon-green);
      border-radius: 10px;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 2px;
      position: relative;
      overflow: hidden;
      min-height: 48px; /* Mobile-friendly tap target */
    }

    .analyze-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 136, 0.2), transparent);
      transition: left 0.5s;
    }

    .analyze-btn:hover::before {
      left: 100%;
    }

    .analyze-btn:hover {
      background: var(--neon-green);
      color: var(--bg);
      box-shadow: var(--glow-green);
    }

    .controls { 
      text-align: center; 
      margin-top: 1.5rem; 
      padding-bottom: env(safe-area-inset-bottom);
    }

    .refresh-btn { 
      background: transparent;
      border: 2px solid var(--neon-blue);
      color: var(--neon-blue);
      padding: 0.9rem 1.5rem; 
      border-radius: 12px; 
      cursor: pointer; 
      font-family: 'Orbitron', monospace;
      font-size: 0.9rem; 
      font-weight: 600;
      width: 100%; 
      max-width: 300px;
      margin: 0 auto; 
      display: block;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
      min-height: 48px;
    }

    .refresh-btn:hover {
      background: var(--neon-blue);
      color: var(--bg);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
    }

    .status-bar { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-top: 0.8rem; 
      color: var(--muted); 
      font-size: 0.8rem; 
      padding: 0 0.5rem;
    }

    .paper-trading {
      margin-top: 1.5rem;
      padding: 1.2rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    .paper-trading h3 {
      font-family: 'Orbitron', monospace;
      color: var(--neon-purple);
      margin-bottom: 1rem;
      font-size: 1.1rem;
    }

    .trade-log {
      max-height: 200px;
      overflow-y: auto;
      margin-top: 1rem;
    }

    .trade-item {
      display: flex;
      justify-content: space-between;
      padding: 0.6rem;
      margin: 0.3rem 0;
      background: rgba(30, 41, 59, 0.5);
      border-radius: 8px;
      border-left: 3px solid;
      font-size: 0.85rem;
    }

    .trade-item.buy { border-left-color: var(--neon-green); }
    .trade-item.sell { border-left-color: var(--neon-red); }

    .error { 
      color: var(--neon-red); 
      text-align: center; 
      padding: 1rem; 
      background: rgba(255, 51, 102, 0.1); 
      border-radius: 12px; 
      margin-top: 1rem; 
      display: none; 
      border: 1px solid var(--neon-red);
    }

    .loading { opacity: 0.7; pointer-events: none; }

    @media (min-width: 640px) { 
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    .connection-status {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .connection-status.online {
      background: rgba(0, 255, 136, 0.1);
      color: var(--neon-green);
    }

    .connection-status.offline {
      background: rgba(255, 51, 102, 0.1);
      color: var(--neon-red);
    }

    /* Battery-saving: reduce animations */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Better mobile form inputs */
    @media (max-width: 640px) {
      input, select, button {
        font-size: 16px; /* Prevents iOS zoom on focus */
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⚡ SIGNUM</div>
    <div class="subtitle">BTC/ETH SCALPING ENGINE • 15M • REAL-TIME • INDIA OPTIMIZED</div>
  </div>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">Paper Trades</div>
      <div class="stat-value" id="total-trades">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Win Rate</div>
      <div class="stat-value" id="win-rate">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total P&L</div>
      <div class="stat-value" id="total-pnl">--</div>
    </div>
  </div>

  <main class="grid" id="signals-container"></main>

  <div class="error" id="error-msg"></div>

  <div class="paper-trading">
    <h3>📊 PAPER TRADE LOG</h3>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 1rem;">
      <select id="log-coin" style="padding: 0.6rem; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 8px; min-height: 44px;">
        <option value="BTC">BTC</option>
        <option value="ETH">ETH</option>
      </select>
      <select id="log-type" style="padding: 0.6rem; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 8px; min-height: 44px;">
        <option value="BUY">BUY</option>
        <option value="SELL">SELL</option>
      </select>
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 0.5rem;">
      <input type="number" id="log-entry" placeholder="Entry Price (USD)" style="padding: 0.6rem; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 8px; min-height: 44px;">
      <input type="number" id="log-exit" placeholder="Exit Price (opt)" style="padding: 0.6rem; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 8px; min-height: 44px;">
      <button onclick="addTrade()" style="padding: 0.6rem; background: var(--neon-green); border: none; color: var(--bg); border-radius: 8px; font-weight: 700; cursor: pointer; min-height: 44px;">+ LOG</button>
    </div>
    <div class="trade-log" id="trade-log"></div>
  </div>

  <div class="controls">
    <button class="refresh-btn" onclick="fetchAllSignals()">🔄 ANALYZE BTC/ETH</button>
    <div class="status-bar">
      <span id="status">Next update in 5s</span>
      <span class="connection-status online" id="connection-status">● LIVE</span>
    </div>
  </div>

  <script>
    // ================= CONFIGURATION =================
    const CONFIG = {
      interval: '15m',
      limit: 100,
      refreshMs: 5000,
      rsiPeriod: 14,
      smaPeriod: 50,
      volPeriod: 20,
      volMultiplier: 1.5,
      usdToInr: 83.5, // Update manually or via API
      showInr: false  // Default view
    };

    // ================= ASSETS (BTC/ETH ONLY) =================
    const ASSETS = [
      { symbol: 'BTCUSDT', name: 'Bitcoin', color: '#f7931a' },
      { symbol: 'ETHUSDT', name: 'Ethereum', color: '#627eea' }
    ];

    // ================= UTILITIES =================
    const fmt = (n, d=2) => Number(n).toFixed(d);
    
    const fmtPrice = (n, currency = 'USD') => {
      const value = CONFIG.showInr && currency === 'USD' ? n * CONFIG.usdToInr : n;
      const symbol = CONFIG.showInr && currency === 'USD' ? '₹' : '$';
      const locale = CONFIG.showInr && currency === 'USD' ? 'en-IN' : 'en-US';
      return `${symbol}${Number(value).toLocaleString(locale, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
    };

    const toggleCurrency = () => {
      CONFIG.showInr = !CONFIG.showInr;
      document.querySelectorAll('.currency-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`btn-${CONFIG.showInr ? 'inr' : 'usd'}`).classList.add('active');
      fetchAllSignals(); // Re-render with new currency
    };

    // ================= TECHNICAL INDICATORS (MVP FOCUS) =================
    function calculateRSI(closes, period = CONFIG.rsiPeriod) {
      if (closes.length < period + 1) return 50;
      let gains = 0, losses = 0;
      for (let i = 1; i <= period; i++) {
        const diff = closes[i] - closes[i-1];
        diff >= 0 ? gains += diff : losses -= diff;
      }
      let avgGain = gains / period, avgLoss = losses / period;
      for (let i = period + 1; i < closes.length; i++) {
        const diff = closes[i] - closes[i-1];
        avgGain = (avgGain * (period - 1) + (diff > 0 ? diff : 0)) / period;
        avgLoss = (avgLoss * (period - 1) + (diff < 0 ? -diff : 0)) / period;
      }
      const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
      return 100 - (100 / (1 + rs));
    }

    function calculateSMA(arr, period) { 
      return arr.slice(-period).reduce((a, b) => a + b, 0) / period; 
    }
    
    function calculateEMA(arr, period) {
      const k = 2 / (period + 1);
      let ema = arr[0];
      for (let i = 1; i < arr.length; i++) ema = arr[i] * k + ema * (1 - k);
      return ema;
    }

    // ================= DATA FETCHING (CORS-RESILIENT) =================
    async function fetchKlines(symbol) {
      try {
        // Using Binance public API with fallback error handling
        const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${CONFIG.interval}&limit=${CONFIG.limit}`);
        if (!res.ok) throw new Error(`API ${res.status}`);
        return await res.json();
      } catch (e) {
        console.warn(`Fetch failed for ${symbol}: ${e.message}`);
        // Return mock data for demo continuity (remove in production)
        return generateMockData();
      }
    }

    function generateMockData() {
      // Fallback mock data for testing without API
      const base = Math.random() * 1000 + 60000;
      return Array(CONFIG.limit).fill(0).map((_, i) => [
        Date.now() - (CONFIG.limit - i) * 15 * 60 * 1000,
        base, base + Math.random()*100, base - Math.random()*100,
        base + Math.random()*50 - 25, Math.random()*1000
      ]);
    }

    // ================= ANALYSIS ENGINE (SIMPLIFIED MVP) =================
    function analyzeData(klines) {
      const closes = klines.map(k => parseFloat(k[4]));
      const volumes = klines.map(k => parseFloat(k[5]));
      
      const currentPrice = closes[closes.length - 1];
      const currentVol = volumes[volumes.length - 1];
      
      const rsi = calculateRSI(closes);
      const sma50 = calculateSMA(closes, CONFIG.smaPeriod);
      const ema9 = calculateEMA(closes, 9);
      const ema21 = calculateEMA(closes, 21);
      const volMA = calculateSMA(volumes, CONFIG.volPeriod);
      
      // MACD simplified
      const ema12 = calculateEMA(closes, 12);
      const ema26 = calculateEMA(closes, 26);
      const macdSignal = ema12 > ema26;
      
      return {
        price: currentPrice,
        rsi,
        sma50,
        ema9,
        ema21,
        vol: currentVol,
        volMA,
        macdSignal,
        trend: currentPrice > sma50 ? 'UPTREND' : 'DOWNTREND',
        emaBullish: ema9 > ema21,
        volRatio: currentVol / volMA
      };
    }

    // ================= SIGNAL GENERATION (AI-READY HOOKS) =================
    function generateSignal(d) {
      const indicators = [];
      let strength = 0;

      // RSI Logic
      if (d.rsi < 30) { 
        indicators.push({ name: 'RSI Oversold', type: 'bullish' }); 
        strength += 2; 
      } else if (d.rsi > 70) { 
        indicators.push({ name: 'RSI Overbought', type: 'bearish' }); 
        strength -= 2; 
      } else {
        indicators.push({ name: `RSI ${fmt(d.rsi)}`, type: 'neutral' });
      }

      // EMA Crossover
      if (d.emaBullish) { 
        indicators.push({ name: 'EMA 9>21', type: 'bullish' }); 
        strength++; 
      } else { 
        indicators.push({ name: 'EMA 9<21', type: 'bearish' }); 
        strength--; 
      }

      // Trend Confirmation
      if (d.trend === 'UPTREND') { 
        indicators.push({ name: 'Above SMA50', type: 'bullish' }); 
        strength++; 
      } else { 
        indicators.push({ name: 'Below SMA50', type: 'bearish' }); 
        strength--; 
      }

      // Volume Spike
      if (d.volRatio > CONFIG.volMultiplier) { 
        indicators.push({ name: `Vol ${fmt(d.volRatio,1)}x`, type: 'bullish' }); 
        strength += 1.5; 
      } else {
        indicators.push({ name: `Vol ${fmt(d.volRatio,1)}x`, type: 'neutral' });
      }

      // MACD Confirmation
      if (d.macdSignal) { 
        indicators.push({ name: 'MACD Bullish', type: 'bullish' }); 
        strength++; 
      } else { 
        indicators.push({ name: 'MACD Bearish', type: 'bearish' }); 
        strength--; 
      }

      // Determine base signal
      let signal = 'NEUTRAL';
      if (strength >= 4) signal = 'BUY';
      else if (strength <= -4) signal = 'SELL';
      else if (strength >= 2) signal = 'WEAK_BUY';
      else if (strength <= -2) signal = 'WEAK_SELL';

      // === AI INTEGRATION HOOK ===
      // Uncomment and configure when ready to add AI model:
      /*
      const aiEnhancement = await getAISignal({
        symbol: currentSymbol,
        indicators: indicators.map(i => i.name),
        strength,
        timeframe: CONFIG.interval
      });
      if (aiEnhancement.confidence > 0.8) {
        signal = aiEnhancement.signal; // e.g., 'STRONG_BUY'
      }
      */

      return { 
        signal, 
        indicators, 
        strength,
        confidence: Math.min(0.95, Math.abs(strength) / 6) // Simple confidence metric
      };
    }

    // === FUTURE: AI SIGNAL FUNCTION (PLACEHOLDER) ===
    async function getAISignal(input) {
      // Example structure for future Claude/other AI integration
      // Replace with your actual AI endpoint
      /*
      const response = await fetch('YOUR_AI_ENDPOINT', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-3-haiku', // or your preferred model
          input: {
            asset: input.symbol,
            timeframe: input.timeframe,
            technicals: input.indicators,
            momentum_score: input.strength
          }
        })
      });
      return await response.json();
      */
      
      // Mock response for now
      return { signal: input.strength > 3 ? 'STRONG_BUY' : 'NEUTRAL', confidence: 0.7 };
    }

    // ================= UI RENDERING =================
    function renderAssets() {
      const container = document.getElementById('signals-container');
      container.innerHTML = ASSETS.map(asset => `
        <div class="card" id="${asset.symbol}-card">
          <div class="asset-header">
            <div class="asset-name">
              <span class="asset-dot" style="background: ${asset.color}; box-shadow: 0 0 10px ${asset.color}"></span>
              ${asset.name}
            </div>
            <div class="price-group">
              <div class="price" id="${asset.symbol}-price">Loading...</div>
              <div class="price-inr" id="${asset.symbol}-inr"></div>
              <div class="currency-toggle">
                <button class="currency-btn ${!CONFIG.showInr ? 'active' : ''}" id="btn-usd" onclick="toggleCurrency()">USD</button>
                <button class="currency-btn ${CONFIG.showInr ? 'active' : ''}" id="btn-inr" onclick="toggleCurrency()">INR</button>
              </div>
            </div>
          </div>
          <div class="metrics">
            <div class="metric"><div class="metric-label">RSI (14)</div><div class="metric-value" id="${asset.symbol}-rsi">--</div></div>
            <div class="metric"><div class="metric-label">Trend</div><div class="metric-value" id="${asset.symbol}-trend">--</div></div>
            <div class="metric"><div class="metric-label">MACD</div><div class="metric-value" id="${asset.symbol}-macd">--</div></div>
            <div class="metric"><div class="metric-label">Volume</div><div class="metric-value" id="${asset.symbol}-vol">--</div></div>
          </div>
          <div class="indicators" id="${asset.symbol}-indicators"></div>
          <div class="signal-box neutral" id="${asset.symbol}-signal">SCANNING...</div>
          <button class="analyze-btn" onclick="analyzeSingle('${asset.symbol}')">⚡ Analyze ${asset.symbol.replace('USDT','')}</button>
        </div>
      `).join('');
    }

    function updateUI(symbol, d, signalData) {
      // Price display
      document.getElementById(`${symbol}-price`).textContent = fmtPrice(d.price, 'USD');
      document.getElementById(`${symbol}-inr`).textContent = CONFIG.showInr ? '' : `≈ ${fmtPrice(d.price, 'INR')}`;
      
      // Metrics
      document.getElementById(`${symbol}-rsi`).textContent = fmt(d.rsi);
      document.getElementById(`${symbol}-trend`).textContent = d.trend === 'UPTREND' ? '📈 Bullish' : '📉 Bearish';
      document.getElementById(`${symbol}-macd`).textContent = d.macdSignal ? '🟢 Bullish' : '🔴 Bearish';
      document.getElementById(`${symbol}-vol`).textContent = `${fmt(d.volRatio, 1)}x`;
      
      // Indicators
      const indicatorsEl = document.getElementById(`${symbol}-indicators`);
      indicatorsEl.innerHTML = signalData.indicators.map(ind => 
        `<span class="indicator-tag ${ind.type}">${ind.name}</span>`
      ).join('');
      
      // Signal box with confidence
      const signalEl = document.getElementById(`${symbol}-signal`);
      const displaySignal = signalData.signal.replace('WEAK_', '').replace('STRONG_', '');
      signalEl.textContent = `${displaySignal} ${signalData.confidence > 0.7 ? '★' : ''}`;
      
      // Enhanced styling for strong signals
      let signalClass = signalData.signal.toLowerCase().replace('_', '-');
      if (signalData.confidence > 0.8 && (signalData.signal.includes('STRONG') || Math.abs(signalData.strength) >= 5)) {
        signalClass = signalClass.includes('buy') ? 'strong-buy' : 'strong-sell';
      }
      signalEl.className = `signal-box ${signalClass}`;
      
      // Visual feedback
      document.getElementById(`${symbol}-card`).classList.add('active');
      setTimeout(() => document.getElementById(`${symbol}-card`).classList.remove('active'), 300);
    }

    // ================= MAIN FETCH & UPDATE LOOP =================
    async function fetchAllSignals() {
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';
      document.body.classList.add('loading');

      try {
        await Promise.all(ASSETS.map(async asset => {
          const klines = await fetchKlines(asset.symbol);
          const data = analyzeData(klines);
          const signalData = generateSignal(data);
          updateUI(asset.symbol, data, signalData);
        }));
      } catch (e) {
        errEl.textContent = `⚠️ Update paused: ${e.message}`;
        errEl.style.display = 'block';
        document.getElementById('connection-status').className = 'connection-status offline';
        document.getElementById('connection-status').textContent = '● OFFLINE';
      } finally {
        document.body.classList.remove('loading');
      }
    }

    async function analyzeSingle(symbol) {
      const btn = event.target;
      const originalText = btn.textContent;
      btn.textContent = '⚡ ANALYZING...';
      btn.disabled = true;
      
      try {
        const klines = await fetchKlines(symbol);
        const data = analyzeData(klines);
        const signalData = generateSignal(data);
        updateUI(symbol, data, signalData);
      } catch (e) {
        alert(`Error analyzing ${symbol}: ${e.message}`);
      } finally {
        btn.textContent = originalText;
        btn.disabled = false;
      }
    }

    // ================= PAPER TRADING (LOCAL STORAGE) =================
    function loadTrades() {
      return JSON.parse(localStorage.getItem('signum_trades') || '[]');
    }

    function saveTrades(trades) {
      localStorage.setItem('signum_trades', JSON.stringify(trades));
      updateStats();
    }

    function addTrade() {
      const coin = document.getElementById('log-coin').value;
      const type = document.getElementById('log-type').value;
      const entry = parseFloat(document.getElementById('log-entry').value);
      const exit = parseFloat(document.getElementById('log-exit').value) || null;
      
      if (!entry) { alert('Enter entry price'); return; }
      
      const trades = loadTrades();
      trades.unshift({ coin, type, entry, exit, time: new Date().toISOString() });
      saveTrades(trades);
      renderTrades();
      
      document.getElementById('log-entry').value = '';
      document.getElementById('log-exit').value = '';
    }

    function renderTrades() {
      const trades = loadTrades();
      const container = document.getElementById('trade-log');
      if (trades.length === 0) {
        container.innerHTML = '<div style="color: var(--muted); text-align: center; padding: 1rem;">No trades logged yet</div>';
        return;
      }
      
      container.innerHTML = trades.slice(0, 10).map(trade => {
        const pnl = trade.exit ? ((trade.exit - trade.entry) / trade.entry * 100 * (trade.type === 'BUY' ? 1 : -1)).toFixed(2) : null;
        return `
          <div class="trade-item ${trade.type.toLowerCase()}">
            <span><strong>${trade.coin}</strong> ${trade.type} @ ${fmtPrice(trade.entry)}</span>
            <span>${trade.exit ? fmtPrice(trade.exit) : 'OPEN'} ${pnl ? `(${pnl}%)` : ''}</span>
          </div>
        `;
      }).join('');
      
      updateStats();
    }

    function updateStats() {
      const trades = loadTrades();
      const closedTrades = trades.filter(t => t.exit);
      
      document.getElementById('total-trades').textContent = trades.length;
      
      if (closedTrades.length > 0) {
        const wins = closedTrades.filter(t => {
          const pnl = (t.exit - t.entry) / t.entry * 100 * (t.type === 'BUY' ? 1 : -1);
          return pnl > 0;
        }).length;
        const winRate = (wins / closedTrades.length * 100).toFixed(1);
        document.getElementById('win-rate').textContent = `${winRate}%`;
        
        const totalPnl = closedTrades.reduce((sum, t) => {
          return sum + ((t.exit - t.entry) / t.entry * 100 * (t.type === 'BUY' ? 1 : -1));
        }, 0);
        document.getElementById('total-pnl').textContent = `${totalPnl >= 0 ? '+' : ''}${totalPnl.toFixed(2)}%`;
        document.getElementById('total-pnl').style.color = totalPnl >= 0 ? 'var(--neon-green)' : 'var(--neon-red)';
      }
    }

    // ================= AUTO-REFRESH & WEBSOCKET =================
    let countdown = CONFIG.refreshMs / 1000;
    setInterval(() => {
      countdown--;
      document.getElementById('status').textContent = `Next update in ${countdown}s`;
      if (countdown <= 0) {
        fetchAllSignals();
        countdown = CONFIG.refreshMs / 1000;
      }
    }, 1000);

    // Fixed WebSocket: proper Binance stream syntax for multiple assets
    function initWebSocket() {
      const streams = ASSETS.map(a => `${a.symbol.toLowerCase()}@kline_${CONFIG.interval}`).join('/');
      const wsUrl = `wss://stream.binance.com:9443/stream?streams=${streams}`;
      
      try {
        const ws = new WebSocket(wsUrl);
        ws.onmessage = (event) => {
          const data = JSON.parse(event.data);
          if (data.data && data.data.k && data.data.k.x) {
            // Candle closed - trigger analysis
            fetchAllSignals();
          }
        };
        ws.onclose = () => {
          document.getElementById('connection-status').className = 'connection-status offline';
          document.getElementById('connection-status').textContent = '● RECONNECTING...';
          setTimeout(initWebSocket, 5000); // Auto-reconnect
        };
        ws.onerror = () => {
          console.warn('WebSocket error');
        };
      } catch (e) {
        console.warn('WebSocket init failed:', e);
      }
    }

    // ================= INITIALIZATION =================
    document.addEventListener('DOMContentLoaded', () => {
      renderAssets();
      renderTrades();
      fetchAllSignals();
      initWebSocket();
      
      // Update INR rate daily (optional enhancement)
      // fetch('https://api.exchangerate-api.com/v4/latest/USD')
      //   .then(r => r.json())
      //   .then(data => { CONFIG.usdToInr = data.rates.INR; });
    });
  </script>
